# Permanent redirects from retired/secondary domains to altijdmooiweer.nl.
# Uses a Let's Encrypt cert covering all of them (see deploy/DEPLOY.md).

server {
    listen 80;
    listen [::]:80;
    server_name mooisteweer.nl www.mooisteweer.nl bestweather.nl www.bestweather.nl mooiweershow.nl www.mooiweershow.nl;

    location /.well-known/acme-challenge/ {
        root /var/www/altijdmooiweer.nl/certbot;
    }
    location / {
        return 301 https://altijdmooiweer.nl$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mooisteweer.nl www.mooisteweer.nl bestweather.nl www.bestweather.nl mooiweershow.nl www.mooiweershow.nl;

    ssl_certificate     /etc/letsencrypt/live/mooisteweer.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mooisteweer.nl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSLredir:10m;

    return 301 https://altijdmooiweer.nl$request_uri;
}
