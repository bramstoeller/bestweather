# Apache vhost for BestWeather on mooisteweer.nl
# Install to /etc/apache2/sites-available/mooisteweer_nl.conf, then `a2ensite`.
#
# Scoped to this one domain. Proxies to the local uvicorn (127.0.0.1:8800) and
# tunnels the /ws websocket via mod_proxy_wstunnel. Requires these modules:
#   a2enmod proxy proxy_http proxy_wstunnel
#
# certbot --apache -d mooisteweer.nl -d www.mooisteweer.nl will add the matching
# :443 vhost automatically once DNS points here.

<VirtualHost *:80>
    ServerName mooisteweer.nl
    ServerAlias www.mooisteweer.nl

    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket first (must precede the catch-all), then everything else.
    ProxyPass        /ws  ws://127.0.0.1:8800/ws
    ProxyPassReverse /ws  ws://127.0.0.1:8800/ws
    ProxyPass        /    http://127.0.0.1:8800/
    ProxyPassReverse /    http://127.0.0.1:8800/

    ErrorLog  ${APACHE_LOG_DIR}/mooisteweer_error.log
    CustomLog ${APACHE_LOG_DIR}/mooisteweer_access.log combined
</VirtualHost>
