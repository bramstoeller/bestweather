# nginx vhost for BestWeather on mooisteweer.nl (HTTP stage).
# Symlinked into /etc/nginx/conf.d/mooisteweer.nl.conf.
#
# This HTTP-only stage is safe to enable before TLS certs exist: it references
# no certificate files, so `nginx -t` cannot fail on a missing cert and break
# reloads for the other vhosts on this host. Once the certs are in
# /var/www/mooisteweer.nl/ssl/, swap this file's contents for deploy/nginx-https.conf.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name mooisteweer.nl www.mooisteweer.nl;

    # ACME http-01 challenge webroot (used if a cert is issued via certbot webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/mooisteweer.nl/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Websocket upgrade for /ws.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/mooisteweer.nl.access.log;
    error_log  /var/log/nginx/mooisteweer.nl.error.log;
}
