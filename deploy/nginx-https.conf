# nginx vhost for BestWeather on mooisteweer.nl (HTTPS stage).
# Swap this into deploy/nginx.conf ONCE the certificate files exist at:
#   /var/www/mooisteweer.nl/ssl/certificate.crt
#   /var/www/mooisteweer.nl/ssl/certificate.key
#   /var/www/mooisteweer.nl/ssl/cabundle.crt
# then: sudo nginx -t && sudo systemctl reload nginx
#
# Mirrors the house style of ehbo.app, EXCEPT Permissions-Policy allows
# geolocation=(self) — BestWeather needs the browser location API.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name mooisteweer.nl www.mooisteweer.nl;

    location /.well-known/acme-challenge/ {
        root /var/www/mooisteweer.nl/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mooisteweer.nl www.mooisteweer.nl;

    # fullchain.crt = certificate.crt + cabundle.crt (leaf + intermediates) so
    # nginx serves the COMPLETE chain. Regenerate on cert renewal:
    #   cat certificate.crt cabundle.crt > fullchain.crt
    ssl_certificate         /var/www/mooisteweer.nl/ssl/fullchain.crt;
    ssl_certificate_key     /var/www/mooisteweer.nl/ssl/certificate.key;
    ssl_trusted_certificate /var/www/mooisteweer.nl/ssl/cabundle.crt;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSLmw:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    server_tokens off;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;

    location / {
        proxy_pass http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/mooisteweer.nl.access.log;
    error_log  /var/log/nginx/mooisteweer.nl.error.log;
}
