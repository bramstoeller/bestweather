# nginx reverse proxy for BestWeather on mooisteweer.nl
# Install to /etc/nginx/sites-available/mooisteweer.nl and symlink into
# sites-enabled. This is a SINGLE new server block scoped to this domain only —
# it does not change the default server or any other vhost on the host.
#
# It proxies to the local uvicorn (127.0.0.1:8800) and forwards websocket
# upgrades for the live /ws stream.

# Required once, in the http{} context, for websocket upgrades. If another
# vhost already defines `map $http_upgrade $connection_upgrade`, REMOVE this
# block to avoid a duplicate-definition error.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name mooisteweer.nl www.mooisteweer.nl;

    # certbot will add the listen 443 / ssl_* lines here automatically.

    location / {
        proxy_pass http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Websocket upgrade for /ws.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
    }
}
